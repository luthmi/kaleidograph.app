const { useState, useRef, useEffect, useCallback, useMemo } = React;

const CIRCLE_OF_FIFTHS = [0, 7, 2, 9, 4, 11, 6, 1, 8, 3, 10, 5];
const NOTE_NAMES = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];

// Custom color mapping for pitch classes
// C=red, D=orange, E=yellow, F=green, G=blue, A=purple, B=magenta
const PITCH_CLASS_HUES = {
  0: 0,      // C - red
  1: 15,     // C# - red-orange
  2: 30,     // D - orange
  3: 45,     // D# - orange-yellow
  4: 60,     // E - yellow
  5: 120,    // F - green
  6: 170,    // F# - cyan-green
  7: 220,    // G - blue
  8: 260,    // G# - blue-purple
  9: 280,    // A - purple
  10: 310,   // A# - purple-magenta
  11: 330,   // B - magenta
};

const pitchClassToHue = (pitchClass) => PITCH_CLASS_HUES[pitchClass] || 0;

const midiToFrequency = (midiNote) => 440 * Math.pow(2, (midiNote - 69) / 12);

// Synth presets: simple waveform combinations
const SYNTH_PRESETS = {
  saw: { wave1: 'sawtooth', wave2: 'sawtooth', detune: 1.005, filterBase: 2500, filterVel: 2000, name: 'Synth 1' },
  pad: { wave1: 'triangle', wave2: 'sine', detune: 1.002, filterBase: 1200, filterVel: 800, name: 'Synth 2' },
  square: { wave1: 'square', wave2: 'square', detune: 1.003, filterBase: 1500, filterVel: 1500, name: 'Synth 3' },
  bass: { wave1: 'sawtooth', wave2: 'sine', detune: 1.001, filterBase: 800, filterVel: 600, name: 'Synth 4' },
  bell: { wave1: 'sine', wave2: 'triangle', detune: 2.0, filterBase: 4000, filterVel: 1000, name: 'Synth 5' },
  piano: { wave1: 'triangle', wave2: 'sine', detune: 1.001, filterBase: 3000, filterVel: 2500, name: 'Synth 6' },
  epiano: { wave1: 'sine', wave2: 'triangle', detune: 1.003, filterBase: 2000, filterVel: 1500, name: 'Synth 7' },
  organ: { wave1: 'sine', wave2: 'sine', detune: 2.0, filterBase: 3500, filterVel: 500, name: 'Synth 8' },
  pluck: { wave1: 'sawtooth', wave2: 'triangle', detune: 1.002, filterBase: 4500, filterVel: 3000, name: 'Synth 9' },
};

class Synthesizer {
  constructor() {
    this.audioContext = null;
    this.masterGain = null;
    this.activeVoices = new Map();
    this.initialized = false;
    this.channelVolumes = {}; // channel -> volume (0-1)
    this.channelPresets = {}; // channel -> preset key
    this.recordingDestination = null;
  }
  
  async init() {
    if (this.initialized) return;
    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
    this.masterGain = this.audioContext.createGain();
    this.masterGain.gain.value = 0.3;
    this.masterGain.connect(this.audioContext.destination);
    
    this.convolver = this.audioContext.createConvolver();
    this.reverbGain = this.audioContext.createGain();
    this.reverbGain.gain.value = 0.2;
    
    const sampleRate = this.audioContext.sampleRate;
    const length = sampleRate * 2;
    const impulse = this.audioContext.createBuffer(2, length, sampleRate);
    for (let channel = 0; channel < 2; channel++) {
      const channelData = impulse.getChannelData(channel);
      for (let i = 0; i < length; i++) {
        channelData[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 2);
      }
    }
    this.convolver.buffer = impulse;
    this.convolver.connect(this.reverbGain);
    this.reverbGain.connect(this.audioContext.destination);
    this.initialized = true;
  }
  
  connectToDestination(destination) {
    if (this.masterGain && destination) {
      this.recordingDestination = destination;
      this.masterGain.connect(destination);
      this.reverbGain.connect(destination);
    }
  }
  
  disconnectFromDestination() {
    if (this.recordingDestination && this.masterGain) {
      try {
        this.masterGain.disconnect(this.recordingDestination);
        this.reverbGain.disconnect(this.recordingDestination);
      } catch (e) {}
      this.recordingDestination = null;
    }
  }
  
  setChannelVolume(channel, volume) {
    this.channelVolumes[channel] = volume;
  }
  
  setChannelPreset(channel, preset) {
    this.channelPresets[channel] = preset;
  }
  
  getChannelVolume(channel) {
    return this.channelVolumes[channel] !== undefined ? this.channelVolumes[channel] : 1;
  }
  
  getChannelPreset(channel) {
    return this.channelPresets[channel] || 'epiano';
  }
  
  // Drum synthesis - note number determines instrument type
  playDrum(note, velocity) {
    if (!this.initialized) return;
    const now = this.audioContext.currentTime;
    const channelVol = this.getChannelVolume(9);
    const velGain = (velocity / 127) * 0.5 * channelVol;
    
    // Categorize by GM drum map ranges
    // 35-36: Kick drums
    // 37-40: Snare/sidestick/claps
    // 41-45: Toms
    // 46-51: Hi-hats and cymbals
    // 52+: Other cymbals/percussion
    
    if (note >= 35 && note <= 36) {
      // KICK - low sine with pitch envelope
      const osc = this.audioContext.createOscillator();
      const gain = this.audioContext.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(150, now);
      osc.frequency.exponentialRampToValueAtTime(40, now + 0.1);
      gain.gain.setValueAtTime(velGain * 1.2, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      osc.connect(gain);
      gain.connect(this.masterGain);
      osc.start(now);
      osc.stop(now + 0.3);
    } else if (note >= 37 && note <= 40) {
      // SNARE - noise burst + tone
      const bufferSize = this.audioContext.sampleRate * 0.15;
      const buffer = this.audioContext.createBuffer(1, bufferSize, this.audioContext.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
      }
      const noise = this.audioContext.createBufferSource();
      noise.buffer = buffer;
      const noiseGain = this.audioContext.createGain();
      const noiseFilter = this.audioContext.createBiquadFilter();
      noiseFilter.type = 'highpass';
      noiseFilter.frequency.value = 1000;
      noiseGain.gain.setValueAtTime(velGain * 0.8, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      noise.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(this.masterGain);
      noise.start(now);
      
      // Add tone component
      const osc = this.audioContext.createOscillator();
      const oscGain = this.audioContext.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(200, now);
      osc.frequency.exponentialRampToValueAtTime(100, now + 0.05);
      oscGain.gain.setValueAtTime(velGain * 0.5, now);
      oscGain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
      osc.connect(oscGain);
      oscGain.connect(this.masterGain);
      osc.start(now);
      osc.stop(now + 0.1);
    } else if (note >= 41 && note <= 45) {
      // TOMS - pitched sine with envelope
      const pitchMap = { 41: 80, 42: 70, 43: 100, 44: 70, 45: 120 };
      const freq = pitchMap[note] || 100;
      const osc = this.audioContext.createOscillator();
      const gain = this.audioContext.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq * 1.5, now);
      osc.frequency.exponentialRampToValueAtTime(freq, now + 0.05);
      gain.gain.setValueAtTime(velGain, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
      osc.connect(gain);
      gain.connect(this.masterGain);
      osc.start(now);
      osc.stop(now + 0.25);
    } else {
      // HI-HATS & CYMBALS - filtered noise
      const isOpen = note === 46 || note >= 49; // Open hat or cymbals
      const duration = isOpen ? 0.3 : 0.08;
      const bufferSize = this.audioContext.sampleRate * duration;
      const buffer = this.audioContext.createBuffer(1, bufferSize, this.audioContext.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, isOpen ? 1 : 3);
      }
      const noise = this.audioContext.createBufferSource();
      noise.buffer = buffer;
      const gain = this.audioContext.createGain();
      const filter = this.audioContext.createBiquadFilter();
      filter.type = 'highpass';
      filter.frequency.value = isOpen ? 5000 : 7000;
      gain.gain.setValueAtTime(velGain * 0.4, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
      noise.connect(filter);
      filter.connect(gain);
      gain.connect(this.masterGain);
      noise.start(now);
    }
  }
  
  noteOn(note, velocity, channel = 0) {
    if (!this.initialized) return;
    
    // Handle drums separately
    if (channel === 9) {
      this.playDrum(note, velocity);
      return;
    }
    
    const freq = midiToFrequency(note);
    const noteKey = `${channel}-${note}`;
    this.noteOff(note, channel);
    
    const now = this.audioContext.currentTime;
    const osc1 = this.audioContext.createOscillator();
    const osc2 = this.audioContext.createOscillator();
    const gainNode = this.audioContext.createGain();
    const filterNode = this.audioContext.createBiquadFilter();
    
    // Get preset for this channel
    const presetKey = this.getChannelPreset(channel);
    const preset = SYNTH_PRESETS[presetKey] || SYNTH_PRESETS.saw;
    
    osc1.type = preset.wave1;
    osc2.type = preset.wave2;
    osc1.frequency.value = freq;
    osc2.frequency.value = freq * preset.detune;
    filterNode.type = 'lowpass';
    filterNode.frequency.value = preset.filterBase + (velocity / 127) * preset.filterVel;
    filterNode.Q.value = 1;
    
    const channelVol = this.getChannelVolume(channel);
    const velGain = (velocity / 127) * 0.4 * channelVol;
    gainNode.gain.setValueAtTime(0, now);
    gainNode.gain.linearRampToValueAtTime(velGain, now + 0.02);
    
    osc1.connect(filterNode); osc2.connect(filterNode);
    filterNode.connect(gainNode);
    gainNode.connect(this.masterGain);
    gainNode.connect(this.convolver);
    osc1.start(now); osc2.start(now);
    
    this.activeVoices.set(noteKey, { osc1, osc2, gainNode, filterNode });
  }
  
  noteOff(note, channel = 0) {
    if (!this.initialized) return;
    if (channel === 9) return; // Drums are fire-and-forget
    
    const noteKey = `${channel}-${note}`;
    const voice = this.activeVoices.get(noteKey);
    if (voice) {
      const now = this.audioContext.currentTime;
      voice.gainNode.gain.linearRampToValueAtTime(0, now + 0.1);
      setTimeout(() => {
        try { voice.osc1.stop(); voice.osc2.stop(); voice.osc1.disconnect(); voice.osc2.disconnect(); voice.gainNode.disconnect(); voice.filterNode.disconnect(); } catch (e) {}
      }, 150);
      this.activeVoices.delete(noteKey);
    }
  }
  
  allNotesOff() {
    for (const [noteKey, voice] of this.activeVoices) {
      const now = this.audioContext.currentTime;
      voice.gainNode.gain.linearRampToValueAtTime(0, now + 0.05);
      setTimeout(() => {
        try { voice.osc1.stop(); voice.osc2.stop(); voice.osc1.disconnect(); voice.osc2.disconnect(); voice.gainNode.disconnect(); voice.filterNode.disconnect(); } catch (e) {}
      }, 100);
    }
    this.activeVoices.clear();
  }
  
  setVolume(value) { if (this.masterGain) this.masterGain.gain.value = value; }
  resume() { if (this.audioContext?.state === 'suspended') this.audioContext.resume(); }
}

// Improved MIDI parser with better multi-track support
const parseMidi = (arrayBuffer) => {
  const data = new Uint8Array(arrayBuffer);
  let pos = 0;
  
  const readInt = (bytes) => { 
    let val = 0; 
    for (let i = 0; i < bytes; i++) {
      val = (val << 8) | data[pos++];
    }
    return val; 
  };
  
  const readVarLen = () => { 
    let val = 0, byte; 
    do { 
      byte = data[pos++]; 
      val = (val << 7) | (byte & 0x7f); 
    } while (byte & 0x80 && pos < data.length); 
    return val; 
  };
  
  // Check MIDI header
  const headerStr = String.fromCharCode(...data.slice(0, 4));
  if (headerStr !== 'MThd') throw new Error('Not a valid MIDI file');
  
  pos = 4;
  const headerLength = readInt(4);
  const format = readInt(2);
  const numTracks = readInt(2);
  const timeDivision = readInt(2);
  
  const ticksPerBeat = timeDivision & 0x7fff;
  
  const allEvents = [];
  const tempoChanges = [{ tick: 0, microsecondsPerBeat: 500000 }];
  const trackInfo = new Map(); // Track which channels/tracks have notes
  
  // Parse each track
  for (let track = 0; track < numTracks; track++) {
    // Find next track chunk
    while (pos < data.length - 8) {
      const chunkType = String.fromCharCode(...data.slice(pos, pos + 4));
      if (chunkType === 'MTrk') break;
      pos += 4;
      const skipLen = readInt(4);
      pos += skipLen;
    }
    
    if (pos >= data.length - 8) break;
    
    const trackHeader = String.fromCharCode(...data.slice(pos, pos + 4));
    if (trackHeader !== 'MTrk') continue;
    
    pos += 4;
    const trackLength = readInt(4);
    const trackEnd = pos + trackLength;
    
    let absoluteTick = 0;
    let runningStatus = 0;
    
    while (pos < trackEnd && pos < data.length) {
      const deltaTick = readVarLen();
      absoluteTick += deltaTick;
      
      if (pos >= data.length) break;
      
      let statusByte = data[pos];
      
      if (statusByte < 0x80) {
        statusByte = runningStatus;
      } else {
        pos++;
        if (statusByte < 0xf0) {
          runningStatus = statusByte;
        }
      }
      
      const messageType = statusByte >> 4;
      const channel = statusByte & 0x0f;
      
      if (messageType === 0x9 && pos + 1 < data.length) {
        const note = data[pos++];
        const velocity = data[pos++];
        // Include ALL channels now (we'll filter at playback time)
        allEvents.push({ 
          type: velocity > 0 ? 'noteOn' : 'noteOff', 
          tick: absoluteTick, 
          note, 
          velocity, 
          channel,
          track 
        });
        // Track info for this channel
        if (velocity > 0) {
          const key = `ch${channel}`;
          if (!trackInfo.has(key)) {
            trackInfo.set(key, { 
              channel, 
              track, 
              noteCount: 0, 
              isDrum: channel === 9,
              name: channel === 9 ? 'Drums (Ch 10)' : `Channel ${channel + 1}`
            });
          }
          trackInfo.get(key).noteCount++;
        }
      } else if (messageType === 0x8 && pos + 1 < data.length) {
        const note = data[pos++];
        pos++; // velocity
        allEvents.push({ 
          type: 'noteOff', 
          tick: absoluteTick, 
          note, 
          channel,
          track 
        });
      } else if (messageType === 0xa || messageType === 0xb || messageType === 0xe) {
        pos += 2;
      } else if (messageType === 0xc || messageType === 0xd) {
        pos += 1;
      } else if (statusByte === 0xff && pos < data.length) {
        const metaType = data[pos++];
        const metaLength = readVarLen();
        
        if (metaType === 0x51 && metaLength === 3 && pos + 2 < data.length) {
          const newTempo = (data[pos] << 16) | (data[pos + 1] << 8) | data[pos + 2];
          tempoChanges.push({ tick: absoluteTick, microsecondsPerBeat: newTempo });
        }
        pos += metaLength;
      } else if (statusByte === 0xf0 || statusByte === 0xf7) {
        const sysexLength = readVarLen();
        pos += sysexLength;
      }
    }
    
    // Ensure we're at track end
    pos = Math.max(pos, trackEnd);
  }
  
  // Sort all events by tick
  allEvents.sort((a, b) => a.tick - b.tick);
  tempoChanges.sort((a, b) => a.tick - b.tick);
  
  // Build tempo map for accurate timing
  const tickToMs = (targetTick) => {
    let ms = 0;
    let lastTick = 0;
    let currentTempo = 500000;
    
    for (const change of tempoChanges) {
      if (change.tick > targetTick) break;
      const deltaTicks = change.tick - lastTick;
      ms += (deltaTicks / ticksPerBeat) * (currentTempo / 1000);
      lastTick = change.tick;
      currentTempo = change.microsecondsPerBeat;
    }
    
    const remainingTicks = targetTick - lastTick;
    ms += (remainingTicks / ticksPerBeat) * (currentTempo / 1000);
    
    return ms;
  };
  
  // Add ms timing to events
  allEvents.forEach(event => {
    event.timeMs = tickToMs(event.tick);
  });
  
  // Calculate duration
  const maxTick = allEvents.length > 0 ? Math.max(...allEvents.map(e => e.tick)) : 0;
  const durationMs = tickToMs(maxTick) + 2000; // Add 2 second buffer
  
  // Convert trackInfo map to sorted array
  const tracks = Array.from(trackInfo.values()).sort((a, b) => a.channel - b.channel);
  
  console.log(`Parsed MIDI: ${allEvents.length} events, ${tracks.length} channels, duration: ${Math.round(durationMs/1000)}s`);
  
  return { events: allEvents, durationMs, numTracks, tracks, ticksPerBeat, tempoChanges };
};

const analyzeChord = (pitchClasses) => {
  if (pitchClasses.length === 0) return { type: 'silence', root: null };
  if (pitchClasses.length === 1) return { type: 'single', root: pitchClasses[0] };
  
  const sorted = [...pitchClasses].sort((a, b) => a - b);
  let bestMatch = { type: 'cluster', root: sorted[0], score: 0 };
  
  const chordTypes = { 'major': [0, 4, 7], 'minor': [0, 3, 7], 'diminished': [0, 3, 6], 'augmented': [0, 4, 8], 'major7': [0, 4, 7, 11], 'minor7': [0, 3, 7, 10], 'dominant7': [0, 4, 7, 10], 'diminished7': [0, 3, 6, 9], 'sus4': [0, 5, 7], 'sus2': [0, 2, 7] };
  
  for (const pc of sorted) {
    const intervals = sorted.map(p => (p - pc + 12) % 12).sort((a, b) => a - b);
    for (const [type, template] of Object.entries(chordTypes)) {
      const matches = template.filter(t => intervals.includes(t)).length;
      const score = matches / template.length;
      if (score > bestMatch.score) bestMatch = { type, root: pc, score };
    }
  }
  return bestMatch;
};

const calculateConsonance = (pitchClasses) => {
  if (pitchClasses.length < 2) return 1;
  const consonanceValues = { 0: 1.0, 7: 0.95, 5: 0.9, 4: 0.8, 3: 0.75, 9: 0.7, 8: 0.65, 2: 0.4, 10: 0.35, 11: 0.3, 1: 0.2, 6: 0.25 };
  let total = 0, pairs = 0;
  for (let i = 0; i < pitchClasses.length; i++) {
    for (let j = i + 1; j < pitchClasses.length; j++) {
      total += consonanceValues[Math.abs(pitchClasses[i] - pitchClasses[j]) % 12] || 0.5;
      pairs++;
    }
  }
  return pairs > 0 ? total / pairs : 1;
};

const generateChromaticSpiral = () => {
  const notes = [];
  for (let midiNote = 21; midiNote <= 108; midiNote++) {
    notes.push({
      note: midiNote,
      pitchClass: midiNote % 12,
      octave: Math.floor(midiNote / 12) - 1
    });
  }
  return notes;
};

const ALL_NOTES = generateChromaticSpiral();

// Simple chromatic color function
const getHue = (pc) => PITCH_CLASS_HUES[pc] || 0;

// Render frame with all visual options
const renderFrame = (ctx, slice, options, width, height, time = 0) => {
  const { symmetry, symmetryMode, symmetryIntensity, tilingDensity, tessellationPattern, showTrails, glowIntensity, rotationSpeed, shapeRotationSpeed, shapeSize, shapePulse, shapeWisps, particleMode, showIntervalLines, showCenterDots, showNoteLetters, showChromaticSpiral, zoomSpeed, tiltX, tiltY, backgroundStyle, customBgHue, customBgSat, customBgLight, bgImage, blobMorph, atomicSpin, noteEcho, sphereMode, noteArrangement, geometryMode, fractureType, fractureIntensity, chromaticAberration, onionLayers, moireIntensity, hueCycleSpeed, fractalDepth, radialBlur, bloomIntensity, textureOverlay, gradientMode, depthLayers, particlePhysics, drumPulse } = options;
  const centerX = width / 2, centerY = height / 2;
  const maxRadius = Math.min(width, height) / 2 - 20;
  
  // Tonnetz grid position calculator
  // Tonnetz arranges notes so fifths are horizontal, major thirds diagonal up-right, minor thirds diagonal down-right
  const getTonnetzPosition = (pitchClass, octave, radius) => {
    // In Tonnetz: moving right = +7 semitones (fifth), moving diagonal up-right = +4 semitones (major third)
    // Using axial coordinates centered around C
    
    // Map pitch class to Tonnetz coordinates (centered around origin)
    // Fifths go horizontal: F-C-G-D-A-E-B
    // Major thirds go diagonal: C-E-G#, F-A-C#, etc.
    const tonnetzCoords = {
      0:  { x: 0, y: 0 },     // C (center)
      1:  { x: 1, y: -3 },    // C#/Db
      2:  { x: 2, y: 0 },     // D (two fifths right of C)
      3:  { x: -1, y: 1 },    // Eb/D# (minor third above C)
      4:  { x: 0, y: -1 },    // E (major third below C in this layout)
      5:  { x: -1, y: 0 },    // F (fifth left of C)
      6:  { x: 0, y: -2 },    // F#/Gb
      7:  { x: 1, y: 0 },     // G (fifth right of C)
      8:  { x: -1, y: -1 },   // Ab/G#
      9:  { x: 0, y: 1 },     // A (minor third above E, or major third above F)
      10: { x: -2, y: 0 },    // Bb (two fifths left of C)
      11: { x: 1, y: -1 },    // B (major third below G)
    };
    
    const coord = tonnetzCoords[pitchClass] || { x: 0, y: 0 };
    
    // Hexagonal grid spacing - make it larger for better spread
    const hexWidth = radius * 0.22;
    const hexHeight = hexWidth * Math.sqrt(3) * 0.85;
    
    // Convert to screen coordinates (hexagonal layout)
    const screenX = coord.x * hexWidth + coord.y * hexWidth * 0.5;
    const screenY = coord.y * hexHeight;
    
    // Add octave offset (spread octaves diagonally)
    const octaveOffset = (octave - 4) * radius * 0.15;
    const octaveAngle = Math.PI * 0.75; // Diagonal direction for octaves
    
    return {
      x: screenX + (octave - 4) * hexWidth * 0.3,
      y: screenY + (octave - 4) * hexHeight * 0.4
    };
  };
  
  // Circle of fifths order: C, G, D, A, E, B, F#/Gb, Db, Ab, Eb, Bb, F
  // Maps pitch class to position on circle of fifths (0-11)
  const CIRCLE_OF_FIFTHS_ORDER = [0, 7, 2, 9, 4, 11, 6, 1, 8, 3, 10, 5];
  const pitchClassToFifthsPosition = (pc) => CIRCLE_OF_FIFTHS_ORDER.indexOf(pc);
  
  // Get note position based on arrangement mode
  const getNotePosition = (note, wedgeAngle, maxR) => {

    } else if (noteArrangement === 'fifths') {

      const octaveRadius = normalizedPitch * maxR * 0.75 + maxR * 0.1;
      const fifthsPosition = pitchClassToFifthsPosition(note.pitchClass);
      const noteAngle = (fifthsPosition / 12) * wedgeAngle * 0.8;
      return {
        x: Math.cos(noteAngle) * octaveRadius,
        y: Math.sin(noteAngle) * octaveRadius
      };
    } else {

      const normalizedPitch = (note.note - 21) / (108 - 21);
      const octaveRadius = normalizedPitch * maxR * 0.75 + maxR * 0.1;
      const noteAngle = (note.pitchClass / 12) * wedgeAngle * 0.8;

      kickPulse = drumPulse.kick.intensity * Math.max(0, 1 - elapsed / 150);

    if (drumPulse.snare && drumPulse.snare.intensity > 0) {
      const elapsed = now - drumPulse.snare.timestamp;
      snarePulse = drumPulse.snare.intensity * Math.max(0, 1 - elapsed / 100);
    }
    if (drumPulse.hihat && drumPulse.hihat.intensity > 0) {

  }
  
  // Background colors based on style
  const customBgFill = `hsl(${customBgHue}, ${customBgSat}%, ${customBgLight}%)`;
  const bgColors = {
    dark: { fill: '#0a0a0f', fade: 'rgba(10, 10, 15,' },
    light: { fill: '#f5f5f5', fade: 'rgba(245, 245, 245,' },
    sky: { fill: '#4a90d9', fade: 'rgba(74, 144, 217,' },
    space: { fill: '#020010', fade: 'rgba(2, 0, 16,' },
    custom: { fill: customBgFill, fade: `hsla(${customBgHue}, ${customBgSat}%, ${customBgLight}%,` },

  };
  const bg = bgColors[backgroundStyle] || bgColors.dark;

      renderFrame.bgImageCache.src = bgImage;

    if (renderFrame.bgImageCache.complete) {

      const scale = Math.max(width / img.width, height / img.height);
      const scaledW = img.width * scale;
      const scaledH = img.height * scale;
      const offsetX = (width - scaledW) / 2;
      const offsetY = (height - scaledH) / 2;
      ctx.drawImage(img, offsetX, offsetY, scaledW, scaledH);
      
      // Add slight darkening overlay for better note visibility

      }
    }
  }
  
  // Background - use trails for tunnel effect
  if (showTrails || Math.abs(zoomSpeed) > 0) {
    const fadeAmount = Math.abs(zoomSpeed) > 0 ? Math.max(0.02, 0.08 - Math.abs(zoomSpeed) * 0.03) : (0.1 + (1 - showTrails) * 0.9);
    ctx.fillStyle = `${bg.fade}${fadeAmount})`;
    ctx.fillRect(0, 0, width, height);
    
    // Add subtle stars for space background
    if (backgroundStyle === 'space' && !showTrails) {
      for (let i = 0; i < 50; i++) {
        const starX = (Math.sin(i * 127.1 + time * 0.0001) * 0.5 + 0.5) * width;
        const starY = (Math.cos(i * 311.7 + time * 0.00005) * 0.5 + 0.5) * height;
        const starSize = 0.5 + Math.sin(i * 73.1 + time * 0.002) * 0.5;

        ctx.arc(starX, starY, starSize, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  } else if (backgroundStyle !== 'image' || !bgImage) {
    // Draw sky gradient for sky background
    if (backgroundStyle === 'sky') {
      const skyGradient = ctx.createLinearGradient(0, 0, 0, height);
      skyGradient.addColorStop(0, '#2d6eb5');
      skyGradient.addColorStop(0.4, '#4a90d9');
      skyGradient.addColorStop(0.7, '#87CEEB');
      skyGradient.addColorStop(1, '#b8dff5');
      ctx.fillStyle = skyGradient;
      ctx.fillRect(0, 0, width, height);
    } else {
      ctx.fillStyle = bg.fill;
      ctx.fillRect(0, 0, width, height);
    }
    
    // Add subtle stars for space background
    if (backgroundStyle === 'space') {
      for (let i = 0; i < 80; i++) {
        const starX = (Math.sin(i * 127.1) * 0.5 + 0.5) * width;
        const starY = (Math.cos(i * 311.7) * 0.5 + 0.5) * height;
        const starSize = 0.5 + Math.sin(i * 73.1 + time * 0.002) * 0.5;
        ctx.fillStyle = `rgba(255, 255, 255, ${0.4 + Math.sin(i + time * 0.001) * 0.3})`;
        ctx.beginPath();
        ctx.arc(starX, starY, starSize, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }
  
  // Simple chromatic color function - with hi-hat flash (boost lightness/saturation)
  const getColor = (pitchClass, saturation, lightness, alpha) => {
    const hue = getHue(pitchClass);
    const flashedSat = Math.min(100, saturation + hihatPulse * 30);
    const flashedLight = Math.min(90, lightness + hihatPulse * 25);
    return `hsla(${hue}, ${flashedSat}%, ${flashedLight}%, ${alpha})`;
  };
  
  const getGradientColor = (ctx, pitchClass, saturation, lightness, alpha, x, y, size) => {
    if (!gradientMode) {
      return getColor(pitchClass, saturation, lightness, alpha);
    }
    
    const hue = getHue(pitchClass);
    const flashedSat = Math.min(100, saturation + hihatPulse * 30);
    const flashedLight = Math.min(90, lightness + hihatPulse * 25);
    
    const gradient = ctx.createRadialGradient(x, y, 0, x, y, size * 2);
    gradient.addColorStop(0, `hsla(${hue}, ${flashedSat}%, ${Math.min(90, flashedLight + 20)}%, ${alpha})`);
    gradient.addColorStop(0.5, `hsla(${hue}, ${flashedSat}%, ${flashedLight}%, ${alpha})`);
    gradient.addColorStop(1, `hsla(${(hue + 30) % 360}, ${flashedSat}%, ${Math.max(20, flashedLight - 20)}%, ${alpha * 0.6})`);
    return gradient;
  };

  
  const globalRotation = (time / 1000) * rotationSpeed * Math.PI * 2;
  const minNote = 21, maxNote = 108;
  
  // Calculate kick scale factor for expanding shapes
  const kickScale = 1 + kickPulse * 0.15;
  
  // Calculate snare shake offset
  const shakeX = snarePulse * (Math.random() - 0.5) * 12;
  const shakeY = snarePulse * (Math.random() - 0.5) * 12;
  
  // Apply 3D perspective tilt and atomic spin
  ctx.save();
  
  // Atomic spin - rotate across all three axes like an atom
  let atomicTiltX = tiltX;
  let atomicTiltY = tiltY;
  if (atomicSpin > 0) {
    const spinTime = time * 0.001 * atomicSpin;
    atomicTiltX = tiltX + Math.sin(spinTime * 0.7) * 60;
    atomicTiltY = tiltY + Math.sin(spinTime * 1.1) * 60;
  }
  
  if (atomicTiltX !== 0 || atomicTiltY !== 0) {
    // Simulate 3D tilt with scale and skew transforms
    const tiltXRad = (atomicTiltX / 100) * Math.PI * 0.4; // Max ~72 degrees
    const tiltYRad = (atomicTiltY / 100) * Math.PI * 0.4;
    
    ctx.translate(centerX, centerY);
    
    // Apply perspective-like scaling
    const scaleY = Math.cos(tiltXRad);
    const scaleX = Math.cos(tiltYRad);
    
    // Skew for 3D effect
    ctx.transform(scaleX, Math.sin(tiltYRad) * 0.3, Math.sin(tiltXRad) * 0.3, scaleY, 0, 0);
    
    ctx.translate(-centerX, -centerY);
  }
  
  // Draw chromatic spiral background if enabled
  if (showChromaticSpiral) {
    ctx.save();
    
    if (noteArrangement === 'tonnetz') {
      // Draw Tonnetz hexagonal grid
      const hexWidth = maxRadius * 0.18;
      const hexHeight = hexWidth * Math.sqrt(3);
      
      ctx.strokeStyle = 'rgba(100, 100, 140, 0.25)';
      ctx.lineWidth = 1;
      
      // Draw hexagonal grid lines
      for (let row = -4; row <= 4; row++) {
        for (let col = -6; col <= 6; col++) {
          const x = centerX + col * hexWidth + row * hexWidth * 0.5;
          const y = centerY + row * hexHeight * 0.75;
          
          const neighbors = [
            { dx: hexWidth, dy: 0 },
            { dx: hexWidth * 0.5, dy: hexHeight * 0.75 },
            { dx: -hexWidth * 0.5, dy: hexHeight * 0.75 }
          ];
          
          neighbors.forEach(n => {
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x + n.dx, y + n.dy);
            ctx.stroke();
          });
        }
      }
      
      // Draw note dots at Tonnetz positions
      for (let pc = 0; pc < 12; pc++) {
        for (let oct = 2; oct <= 6; oct++) {
          const pos = getTonnetzPosition(pc, oct, maxRadius);
          ctx.fillStyle = getColor(pc, 50, 35, 0.5);
          ctx.beginPath();
          ctx.arc(centerX + pos.x, centerY + pos.y, 4, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    } else if (noteArrangement === 'fifths') {
      // Draw circle of fifths spiral
      ALL_NOTES.forEach((noteData) => {
        const normalizedPitch = (noteData.note - minNote) / (maxNote - minNote);
        const noteRadius = normalizedPitch * maxRadius * 0.75 + maxRadius * 0.1;
        const fifthsPos = pitchClassToFifthsPosition(noteData.pitchClass);
        const noteAngle = (fifthsPos / 12) * Math.PI * 2 - Math.PI / 2 + globalRotation;
        
        const x = centerX + Math.cos(noteAngle) * noteRadius;
        const y = centerY + Math.sin(noteAngle) * noteRadius;
        
        ctx.fillStyle = getColor(noteData.pitchClass, 50, 35, 0.6);
        ctx.beginPath();
        ctx.arc(x, y, 5, 0, Math.PI * 2);
        ctx.fill();
      });
    } else {
      // Draw chromatic spiral (default)
      ALL_NOTES.forEach((noteData) => {
        const normalizedPitch = (noteData.note - minNote) / (maxNote - minNote);
        const noteRadius = normalizedPitch * maxRadius * 0.75 + maxRadius * 0.1;
        const noteAngle = (noteData.pitchClass / 12) * Math.PI * 2 - Math.PI / 2 + globalRotation;
        
        const x = centerX + Math.cos(noteAngle) * noteRadius;
        const y = centerY + Math.sin(noteAngle) * noteRadius;
        
        ctx.fillStyle = getColor(noteData.pitchClass, 50, 35, 0.6);
        ctx.beginPath();
        ctx.arc(x, y, 5, 0, Math.PI * 2);
        ctx.fill();
      });

  }
  
  if (!slice || slice.notes.length === 0) {

    ctx.restore();

  const chord = analyzeChord(pitchClasses);
  const consonance = calculateConsonance(pitchClasses);
  
  const baseRotation = chord.root !== null ? (CIRCLE_OF_FIFTHS.indexOf(chord.root) / 12) * Math.PI * 2 : 0;
  
  // Shaped dots mode (0×) - single dots with chord shapes and visual effects
  if (symmetry === -1) {
    // Apply kick scale
    ctx.save();
    if (kickScale > 1) {
      ctx.translate(centerX, centerY);
      ctx.scale(kickScale, kickScale);
      ctx.translate(-centerX, -centerY);
    }
    // Apply snare shake
    if (shakeX !== 0 || shakeY !== 0) {

    }
    
    // Apply global rotation

      ctx.rotate(totalRotation);
      ctx.translate(-centerX, -centerY);

      ctx.transform(1, tiltY / 200, tiltX / 200, 1, 0, 0);

    // Draw background grid based on arrangement mode
    if (noteArrangement === 'tonnetz') {
      // Draw Tonnetz hexagonal grid

      const hexHeight = hexWidth * Math.sqrt(3);
      
      ctx.strokeStyle = 'rgba(50, 50, 70, 0.15)';
      ctx.lineWidth = 1;
      
      // Draw hexagonal grid lines
      for (let row = -4; row <= 4; row++) {
        for (let col = -6; col <= 6; col++) {

          const y = centerY + row * hexHeight * 0.75;
          
          // Draw lines to neighbors (right, down-right, down-left)

            { dx: hexWidth * 0.5, dy: hexHeight * 0.75 },

          ];

            ctx.moveTo(x, y);
            ctx.lineTo(x + n.dx, y + n.dy);

          });
        }
      }
      
      // Draw pitch class labels at Tonnetz positions
      ctx.font = '9px JetBrains Mono, monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = 'rgba(100, 100, 120, 0.3)';
      
      for (let pc = 0; pc < 12; pc++) {

    } else {

      for (let oct = 1; oct <= 8; oct++) {

        ctx.arc(centerX, centerY, r, 0, Math.PI * 2);
        ctx.stroke();
      }
      
      // Draw subtle pitch class lines with labels

      ctx.font = '9px JetBrains Mono, monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      
      for (let i = 0; i < 12; i++) {
        // For fifths mode, use circle of fifths order for position

        const pc = noteArrangement === 'fifths' ? CIRCLE_OF_FIFTHS_ORDER[i] : i;
        const angle = (displayPos / 12) * Math.PI * 2 - Math.PI / 2;
        
        ctx.strokeStyle = 'rgba(50, 50, 70, 0.15)';
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.lineTo(centerX + Math.cos(angle) * maxRadius, centerY + Math.sin(angle) * maxRadius);
        ctx.stroke();
        
        // Draw faint pitch class label

        const labelR = maxRadius + 15;
        ctx.fillText(NOTE_NAMES[pc], centerX + Math.cos(angle) * labelR, centerY + Math.sin(angle) * labelR);
      }
    }
    
    // Helper to get position for interval lines based on arrangement
    const getIntervalPos = (n) => {
      if (noteArrangement === 'tonnetz') {
        return getTonnetzPosition(n.pitchClass, n.octave, maxRadius);
      } else if (noteArrangement === 'fifths') {
        const fifthsPos = pitchClassToFifthsPosition(n.pitchClass);
        const r = ((n.note - minNote) / (maxNote - minNote)) * maxRadius * 0.75 + maxRadius * 0.1;
        const angle = (fifthsPos / 12) * Math.PI * 2 - Math.PI / 2;
        return { x: Math.cos(angle) * r, y: Math.sin(angle) * r };
      } else {
        const r = ((n.note - minNote) / (maxNote - minNote)) * maxRadius * 0.75 + maxRadius * 0.1;
        const angle = (n.pitchClass / 12) * Math.PI * 2 - Math.PI / 2;
        return { x: Math.cos(angle) * r, y: Math.sin(angle) * r };
      }
    };
    
    // Draw interval lines if enabled
    if (showIntervalLines && notes.length > 1) {
      for (let i = 0; i < notes.length; i++) {
        for (let j = i + 1; j < notes.length; j++) {
          const n1 = notes[i], n2 = notes[j];
          const interval = Math.abs(n1.pitchClass - n2.pitchClass);
          const normalizedInterval = interval > 6 ? 12 - interval : interval;
          
          const intervalColors = {
            0: 'rgba(255,255,255,0.5)',
            1: 'rgba(255,100,100,0.3)',
            2: 'rgba(255,150,100,0.3)',
            3: 'rgba(100,255,150,0.4)',
            4: 'rgba(100,255,100,0.4)',
            5: 'rgba(100,200,255,0.4)',
            6: 'rgba(255,100,255,0.3)',

          const pos2 = getIntervalPos(n2);

          ctx.moveTo(centerX + pos1.x, centerY + pos1.y);
          ctx.lineTo(centerX + pos2.x, centerY + pos2.y);
          ctx.stroke();
        }
      }
    }
    
    // Get shape based on chord type
    const shapeMap = { major: 3, major7: 3, minor: 3, minor7: 3, diminished: 4, diminished7: 4, augmented: 6, dominant7: 5, sus4: 4, sus2: 4 };
    const sides = shapeMap[chord.type] || 0;
    const baseShapeRot = (chord.type === 'minor' || chord.type === 'minor7') ? Math.PI / 2 : -Math.PI / 2;
    const shapeRot = baseShapeRot + (shapeRotationSpeed || 0) * time * 0.001 * Math.PI * 2;
    
    // Draw note shapes with visual effects
    notes.forEach((note) => {
      const saturation = 70 + (note.velocity / 127) * 30;
      const lightness = 40 + (note.velocity / 127) * 25;
      
      // Get position based on arrangement mode
      let x, y;
      if (noteArrangement === 'tonnetz') {
        const pos = getTonnetzPosition(note.pitchClass, note.octave, maxRadius);
        x = centerX + pos.x;
        y = centerY + pos.y;
      } else if (noteArrangement === 'fifths') {
        const normalizedPitch = (note.note - minNote) / (maxNote - minNote);
        const noteRadius = normalizedPitch * maxRadius * 0.75 + maxRadius * 0.1;
        const fifthsPos = pitchClassToFifthsPosition(note.pitchClass);
        const noteAngle = (fifthsPos / 12) * Math.PI * 2 - Math.PI / 2;
        x = centerX + Math.cos(noteAngle) * noteRadius;
        y = centerY + Math.sin(noteAngle) * noteRadius;
      } else {
        const normalizedPitch = (note.note - minNote) / (maxNote - minNote);
        const noteRadius = normalizedPitch * maxRadius * 0.75 + maxRadius * 0.1;
        const noteAngle = (note.pitchClass / 12) * Math.PI * 2 - Math.PI / 2;
        x = centerX + Math.cos(noteAngle) * noteRadius;
        y = centerY + Math.sin(noteAngle) * noteRadius;
      }
      
      // Calculate size with shapeSize scale and shapePulse
      const baseSize = 8 + (note.velocity / 127) * 14;
      const pulseAmount = shapePulse > 0 ? Math.sin(time * 0.003 * (1 + shapePulse) + note.pitchClass) * shapePulse * 0.4 : 0;
      const size = baseSize * (shapeSize || 1) * (1 + pulseAmount);
      
      // Draw wisps (color trails emanating from shapes)
      if (shapeWisps > 0) {
        const wispCount = Math.floor(3 + shapeWisps * 4);
        for (let w = 0; w < wispCount; w++) {
          const wispAngle = (w / wispCount) * Math.PI * 2 + time * 0.001 + note.pitchClass;
          const wispLength = size * (1 + shapeWisps * 2);
          const wispX = x + Math.cos(wispAngle) * wispLength;
          const wispY = y + Math.sin(wispAngle) * wispLength;
          
          const gradient = ctx.createLinearGradient(x, y, wispX, wispY);
          gradient.addColorStop(0, getColor(note.pitchClass, saturation, lightness, 0.6));
          gradient.addColorStop(1, getColor(note.pitchClass, saturation, lightness, 0));
          
          ctx.strokeStyle = gradient;
          ctx.lineWidth = 2 + shapeWisps;
          ctx.beginPath();
          ctx.moveTo(x, y);
          ctx.quadraticCurveTo(
            x + Math.cos(wispAngle + 0.3) * wispLength * 0.5,
            y + Math.sin(wispAngle + 0.3) * wispLength * 0.5,
            wispX, wispY
          );
          ctx.stroke();
        }
      }
      
      if (glowIntensity > 0) {
        ctx.shadowColor = getColor(note.pitchClass, saturation, lightness, 0.8);
        ctx.shadowBlur = 15 + glowIntensity * 25;
      }
      
      ctx.fillStyle = getColor(note.pitchClass, saturation, lightness, 0.6 + consonance * 0.4);
      ctx.beginPath();
      
      if (sides > 0 && blobMorph < 50) {
        // Draw polygon shape with optional blob morph (low blob = keep shape)
        if (blobMorph > 0) {
          const points = [];
          const blobSides = sides + Math.floor(blobMorph / 20) * 2; // Add more points for smoother blobs
          for (let i = 0; i < blobSides; i++) {
            const angle = (i / blobSides) * Math.PI * 2 + shapeRot;
            // Multiple noise frequencies for organic movement
            const noise1 = Math.sin(time * 0.002 + i * 1.3 + note.pitchClass * 0.7);
            const noise2 = Math.sin(time * 0.0035 + i * 2.1 + note.pitchClass * 1.1) * 0.5;
            const noise3 = Math.sin(time * 0.0017 + i * 0.8 + note.note * 0.3) * 0.3;
            const wobble = 1 + (noise1 + noise2 + noise3) * (blobMorph / 100) * 0.25;
            points.push({
              px: x + Math.cos(angle) * size * wobble,
              py: y + Math.sin(angle) * size * wobble
            });
          }
          ctx.moveTo(points[0].px, points[0].py);
          for (let i = 0; i < points.length; i++) {
            const curr = points[i];
            const next = points[(i + 1) % points.length];
            const cpX = (curr.px + next.px) / 2;
            const cpY = (curr.py + next.py) / 2;
            ctx.quadraticCurveTo(curr.px, curr.py, cpX, cpY);
          }
          ctx.closePath();
        } else {
          for (let i = 0; i <= sides; i++) {
            const angle = (i / sides) * Math.PI * 2 + shapeRot;
            const px = x + Math.cos(angle) * size;
            const py = y + Math.sin(angle) * size;
            if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
          }
        }
      } else {
        // Draw organic amoeba shape (high blob or no chord shape)
        const blobSides = 12 + Math.floor(blobMorph / 10); // More points for smoother blob
        const points = [];
        for (let i = 0; i < blobSides; i++) {
          const angle = (i / blobSides) * Math.PI * 2 + (shapeRotationSpeed || 0) * time * 0.001 * Math.PI * 2;
          // Multiple noise frequencies for truly organic movement
          const noise1 = Math.sin(time * 0.0019 + i * 1.7 + note.pitchClass * 0.9);
          const noise2 = Math.sin(time * 0.0031 + i * 2.3 + note.pitchClass * 1.3) * 0.6;
          const noise3 = Math.sin(time * 0.0013 + i * 0.9 + note.note * 0.2) * 0.4;
          const noise4 = Math.sin(time * 0.0047 + i * 3.1 + note.velocity * 0.05) * 0.2;
          const wobble = 1 + (noise1 + noise2 + noise3 + noise4) * (blobMorph / 100) * 0.35;
          points.push({
            px: x + Math.cos(angle) * size * wobble,
            py: y + Math.sin(angle) * size * wobble
          });
        }
        ctx.moveTo(points[0].px, points[0].py);
        for (let i = 0; i < points.length; i++) {
          const curr = points[i];
          const next = points[(i + 1) % points.length];
          // Use bezier curves for smoother, more organic shapes
          const cpX = (curr.px + next.px) / 2;
          const cpY = (curr.py + next.py) / 2;
          ctx.quadraticCurveTo(curr.px, curr.py, cpX, cpY);
        }
        ctx.closePath();
      }
      
      ctx.fill();
      ctx.shadowBlur = 0;
      
      // Draw note letter (optional)
      if (showNoteLetters) {
        ctx.fillStyle = '#ffffff';
        ctx.font = `bold ${Math.max(size * 1.2, 12)}px Arial, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(NOTE_NAMES[note.pitchClass], x, y);
      }
      
      // Particles if enabled
      if (particleMode) {
        const particleCount = Math.ceil(note.velocity / 30);
        for (let p = 0; p < particleCount; p++) {
          const spread = size * 1.5;
          const px = x + (Math.random() - 0.5) * spread;
          const py = y + (Math.random() - 0.5) * spread;
          const pSize = 2 + Math.random() * 4;
          
          ctx.fillStyle = getColor(note.pitchClass, saturation, lightness, 0.6 + Math.random() * 0.4);
          ctx.beginPath();
          ctx.arc(px, py, pSize, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    });
    
    // Center dots if enabled
    if (showCenterDots) {
      const zoomAlpha = 0.7;
      const centerSize = 30 + pitchClasses.length * 8;
      pitchClasses.forEach((pc, i) => {
        const angle = (i / pitchClasses.length) * Math.PI * 2 + baseRotation + globalRotation;
        ctx.fillStyle = getColor(pc, 80, 50, zoomAlpha);
        ctx.beginPath();
        ctx.arc(centerX + Math.cos(angle) * centerSize * 0.5, centerY + Math.sin(angle) * centerSize * 0.5, 8 + consonance * 6, 0, Math.PI * 2);
        ctx.fill();
      });
      
      const rootHue = chord.root !== null ? pitchClassToHue(chord.root) : 0;
      const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 15);
      gradient.addColorStop(0, `hsla(${rootHue}, 90%, 70%, 1)`);
      gradient.addColorStop(1, `hsla(${rootHue}, 90%, 50%, 0)`);
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(centerX, centerY, 15, 0, Math.PI * 2);
      ctx.fill();
    }
    
    ctx.restore();
    ctx.filter = 'none';
    ctx.restore();
    // Don't return - continue to post-processing effects
  }
  
  // Analysis mode
  if (symmetry === 1) {
    ctx.font = '11px JetBrains Mono, monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    
    if (noteArrangement === 'tonnetz') {
      // Draw Tonnetz hexagonal grid
      const hexWidth = maxRadius * 0.18;
      const hexHeight = hexWidth * Math.sqrt(3);
      
      ctx.strokeStyle = 'rgba(50, 50, 70, 0.2)';
      ctx.lineWidth = 1;
      
      // Draw hexagonal grid lines
      for (let row = -4; row <= 4; row++) {
        for (let col = -6; col <= 6; col++) {
          const x = centerX + col * hexWidth + row * hexWidth * 0.5;
          const y = centerY + row * hexHeight * 0.75;
          
          const neighbors = [
            { dx: hexWidth, dy: 0 },
            { dx: hexWidth * 0.5, dy: hexHeight * 0.75 },
            { dx: -hexWidth * 0.5, dy: hexHeight * 0.75 }
          ];
          
          neighbors.forEach(n => {
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x + n.dx, y + n.dy);
            ctx.stroke();
          });
        }
      }
      
      // Draw pitch class labels at Tonnetz positions
      for (let pc = 0; pc < 12; pc++) {
        const pos = getTonnetzPosition(pc, 4, maxRadius);
        const isActive = pitchClasses.includes(pc);
        ctx.fillStyle = isActive ? getColor(pc, 80, 70, 1) : 'rgba(80, 80, 100, 0.5)';
        ctx.font = isActive ? 'bold 13px JetBrains Mono, monospace' : '11px JetBrains Mono, monospace';
        ctx.fillText(NOTE_NAMES[pc], centerX + pos.x, centerY + pos.y - 25);
      }
    } else {
      // Spiral or Circle of Fifths mode labels
      for (let i = 0; i < 12; i++) {
        const angle = (i / 12) * Math.PI * 2 - Math.PI / 2;
        const labelRadius = maxRadius + 15;
        // For fifths mode, display pitch class at this position in fifths order
        const pc = noteArrangement === 'fifths' ? CIRCLE_OF_FIFTHS_ORDER[i] : i;
        const isActive = pitchClasses.includes(pc);
        ctx.fillStyle = isActive ? getColor(pc, 80, 70, 1) : 'rgba(80, 80, 100, 0.5)';
        ctx.font = isActive ? 'bold 13px JetBrains Mono, monospace' : '11px JetBrains Mono, monospace';
        ctx.fillText(NOTE_NAMES[pc], centerX + Math.cos(angle) * labelRadius, centerY + Math.sin(angle) * labelRadius);
      }
      
      ctx.strokeStyle = 'rgba(50, 50, 70, 0.3)';
      ctx.lineWidth = 1;
      for (let oct = 1; oct <= 8; oct++) {
        const r = (oct / 9) * maxRadius * 0.85 + maxRadius * 0.1;
        ctx.beginPath();
        ctx.arc(centerX, centerY, r, 0, Math.PI * 2);
        ctx.stroke();
      }
      
      ctx.strokeStyle = 'rgba(50, 50, 70, 0.2)';
      for (let i = 0; i < 12; i++) {
        const angle = (i / 12) * Math.PI * 2 - Math.PI / 2;
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.lineTo(centerX + Math.cos(angle) * maxRadius, centerY + Math.sin(angle) * maxRadius);
        ctx.stroke();
      }
    }
    
    // Helper to get analysis position based on arrangement
    const getAnalysisPos = (n) => {
      if (noteArrangement === 'tonnetz') {
        return getTonnetzPosition(n.pitchClass, n.octave, maxRadius);
      } else if (noteArrangement === 'fifths') {
        const fifthsPos = pitchClassToFifthsPosition(n.pitchClass);
        const r = ((n.note - minNote) / (maxNote - minNote)) * maxRadius * 0.75 + maxRadius * 0.1;
        const angle = (fifthsPos / 12) * Math.PI * 2 - Math.PI / 2;
        return { x: Math.cos(angle) * r, y: Math.sin(angle) * r };
      } else {
        const r = ((n.note - minNote) / (maxNote - minNote)) * maxRadius * 0.75 + maxRadius * 0.1;
        const angle = (n.pitchClass / 12) * Math.PI * 2 - Math.PI / 2;
        return { x: Math.cos(angle) * r, y: Math.sin(angle) * r };
      }
    };
    
    if (showIntervalLines && notes.length > 1) {
      for (let i = 0; i < notes.length; i++) {
        for (let j = i + 1; j < notes.length; j++) {
          const n1 = notes[i], n2 = notes[j];
          const interval = Math.abs(n1.pitchClass - n2.pitchClass);
          const normalizedInterval = interval > 6 ? 12 - interval : interval;
          
          const intervalColors = {
            0: 'rgba(255,255,255,0.6)',
            1: 'rgba(255,100,100,0.4)',
            2: 'rgba(255,150,100,0.4)',
            3: 'rgba(100,255,150,0.5)',
            4: 'rgba(100,255,100,0.5)',
            5: 'rgba(100,200,255,0.5)',
            6: 'rgba(255,100,255,0.4)',
            7: 'rgba(100,150,255,0.6)',
          };
          
          ctx.strokeStyle = intervalColors[normalizedInterval] || 'rgba(150,150,150,0.3)';
          ctx.lineWidth = normalizedInterval === 7 || normalizedInterval === 5 ? 2 : 1;
          
          const pos1 = getAnalysisPos(n1);
          const pos2 = getAnalysisPos(n2);
          
          ctx.beginPath();
          ctx.moveTo(centerX + pos1.x, centerY + pos1.y);
          ctx.lineTo(centerX + pos2.x, centerY + pos2.y);
          ctx.stroke();
        }
      }
    }
    
    notes.forEach((note) => {
      const saturation = 70 + (note.velocity / 127) * 30;
      const lightness = 40 + (note.velocity / 127) * 25;
      
      const pos = getAnalysisPos(note);
      const x = centerX + pos.x;
      const y = centerY + pos.y;
      const size = 8 + (note.velocity / 127) * 12;
      
      if (glowIntensity > 0) {
        const gradient = ctx.createRadialGradient(x, y, 0, x, y, size * (2 + glowIntensity));
        gradient.addColorStop(0, getColor(note.pitchClass, saturation, lightness, 0.8 * glowIntensity));
        gradient.addColorStop(1, getColor(note.pitchClass, saturation, lightness, 0));
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(x, y, size * (2 + glowIntensity), 0, Math.PI * 2);
        ctx.fill();
      }
      
      ctx.fillStyle = getColor(note.pitchClass, saturation, lightness, 0.9);
      ctx.strokeStyle = getColor(note.pitchClass, saturation, lightness + 20, 1);
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(x, y, size, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      
      ctx.fillStyle = '#fff';
      ctx.font = '9px JetBrains Mono, monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(`${NOTE_NAMES[note.pitchClass]}${note.octave}`, x, y);
    });
    
    // Draw chord shape polygon
    if (pitchClasses.length >= 3) {
      ctx.beginPath();
      pitchClasses.forEach((pc, i) => {
        let x, y;
        if (noteArrangement === 'tonnetz') {
          const pos = getTonnetzPosition(pc, 4, maxRadius);
          x = centerX + pos.x;
          y = centerY + pos.y;
        } else if (noteArrangement === 'fifths') {
          const fifthsPos = pitchClassToFifthsPosition(pc);
          const angle = (fifthsPos / 12) * Math.PI * 2 - Math.PI / 2;
          const r = 40;
          x = centerX + Math.cos(angle) * r;
          y = centerY + Math.sin(angle) * r;
        } else {
          const angle = (pc / 12) * Math.PI * 2 - Math.PI / 2;
          const r = 40;
          x = centerX + Math.cos(angle) * r;
          y = centerY + Math.sin(angle) * r;
        }
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.closePath();
      ctx.fillStyle = `rgba(255, 255, 255, 0.1)`;
      ctx.strokeStyle = `rgba(255, 255, 255, 0.4)`;
      ctx.lineWidth = 2;
      ctx.fill();
      ctx.stroke();
    }
    
    ctx.filter = 'none';
    ctx.restore();
    return;
  }
  
  // Sphere mode - 3D gyroscope effect with three intersecting planes
  // When zoomSpeed is active, becomes a fly-through starfield
  if (sphereMode && symmetry > 1) {
    const discRadius = maxRadius * 0.85;
    const rotationY = globalRotation; // Horizontal rotation (controlled by rotationSpeed)
    const rotationX = (tiltX / 100) * Math.PI * 0.5 + (atomicSpin > 0 ? time * 0.001 * atomicSpin : 0); // Vertical tilt + atomicSpin rotation
    const rotationZ = (tiltY / 100) * Math.PI * 0.5; // Roll
    
    // Project 3D point to 2D with perspective
    const project3D = (x, y, z) => {
      // Apply rotations
      let x1 = x * Math.cos(rotationY) - z * Math.sin(rotationY);
      let z1 = x * Math.sin(rotationY) + z * Math.cos(rotationY);
      let y1 = y;
      
      let y2 = y1 * Math.cos(rotationX) - z1 * Math.sin(rotationX);
      let z2 = y1 * Math.sin(rotationX) + z1 * Math.cos(rotationX);
      let x2 = x1;
      
      let x3 = x2 * Math.cos(rotationZ) - y2 * Math.sin(rotationZ);
      let y3 = x2 * Math.sin(rotationZ) + y2 * Math.cos(rotationZ);
      let z3 = z2;
      
      const perspective = 800;
      const scale = perspective / (perspective + z3);
      
      return { x: centerX + x3 * scale, y: centerY + y3 * scale, z: z3, scale };
    };
    
    // Collect all elements to draw with z-sorting
    const elementsToDraw = [];
    
    // Fly-through mode when zoom speed is active
    if (Math.abs(zoomSpeed) > 0) {
      const flyDepth = 1500; // Total depth of the tunnel
      const flySpeed = zoomSpeed * 2; // Speed multiplier
      const numLayers = 8; // Number of depth layers for each note
      
      // For each note, create multiple instances at different depths
      notes.forEach((note) => {
        const saturation = 70 + (note.velocity / 127) * 30;
        const lightness = 45 + (note.velocity / 127) * 25;
        
        // Base position derived from pitch
        const pitchAngle = (note.pitchClass / 12) * Math.PI * 2;
        const normalizedPitch = (note.note - minNote) / (maxNote - minNote);
        const spreadRadius = discRadius * 0.3 + normalizedPitch * discRadius * 0.5;
        
        // Create instances across all symmetry wedges and depth layers
        for (let wedge = 0; wedge < symmetry; wedge++) {
          const wedgeAngle = (wedge / symmetry) * Math.PI * 2 + baseRotation;
          const flip = wedge % 2 === 1;
          
          for (let layer = 0; layer < numLayers; layer++) {
            // Calculate z position with time-based movement
            const layerOffset = (layer / numLayers) * flyDepth;
            const timeOffset = (time * flySpeed * 0.5) % flyDepth;
            let z = layerOffset - timeOffset;
            
            // Wrap around when passing the camera
            if (flySpeed > 0) {
              if (z < -200) z += flyDepth;
            } else {
              if (z > flyDepth - 200) z -= flyDepth;
            }
            
            // Skip if too close (behind camera) or too far
            if (z < -150 || z > flyDepth) continue;
            
            // Calculate x, y position based on pitch and wedge
            const noteAngle = pitchAngle + wedgeAngle;
            let x = Math.cos(noteAngle) * spreadRadius;
            let y = Math.sin(noteAngle) * spreadRadius;
            if (flip) y = -y;
            
            // Add some variation based on layer
            const layerVariation = Math.sin(layer * 1.7 + note.pitchClass) * 30;
            x += layerVariation;
            y += Math.cos(layer * 2.3 + note.note) * layerVariation;
            
            // Project to 2D
            const projected = project3D(x, y, z);
            
            // Calculate size - larger when closer
            const baseSize = 4 + (note.velocity / 127) * 12;
            const depthScale = Math.max(0.2, 1 - z / flyDepth);
            const pulseAmount = shapePulse > 0 ? Math.sin(time * 0.003 * (1 + shapePulse) + note.pitchClass + layer) * shapePulse * 0.3 : 0;
            const size = baseSize * (shapeSize || 1) * (1 + pulseAmount) * projected.scale * depthScale;
            
            // Alpha based on depth - fade in from far, fade out when very close
            const farFade = Math.min(1, (flyDepth - z) / 300);
            const nearFade = Math.min(1, (z + 150) / 200);
            const alpha = farFade * nearFade * 0.9;
            
            if (alpha > 0.05 && size > 0.5) {
              elementsToDraw.push({
                x: projected.x,
                y: projected.y,
                z: projected.z,
                size,
                pitchClass: note.pitchClass,
                saturation,
                lightness,
                alpha,
                velocity: note.velocity
              });
            }
          }
        }
      });
      
      // Add some trailing streaks for fast movement
      if (Math.abs(zoomSpeed) > 0.5) {
        notes.forEach((note) => {
          const pitchAngle = (note.pitchClass / 12) * Math.PI * 2;
          const normalizedPitch = (note.note - minNote) / (maxNote - minNote);
          const spreadRadius = discRadius * 0.4 + normalizedPitch * discRadius * 0.4;
          
          for (let wedge = 0; wedge < symmetry; wedge++) {
            const wedgeAngle = (wedge / symmetry) * Math.PI * 2 + baseRotation;
            const noteAngle = pitchAngle + wedgeAngle;
            const x = Math.cos(noteAngle) * spreadRadius;
            const y = Math.sin(noteAngle) * spreadRadius;
            
            // Create a streak from far to near
            const streakStart = project3D(x, y, 800);
            const streakEnd = project3D(x * 0.3, y * 0.3, 100);
            
            elementsToDraw.push({
              type: 'streak',
              x1: streakStart.x,
              y1: streakStart.y,
              x2: streakEnd.x,
              y2: streakEnd.y,
              z: 400,
              pitchClass: note.pitchClass,
              alpha: 0.1 * Math.abs(zoomSpeed)
            });
          }
        });
      }
    } else {
      // Static three-plane mode (original behavior)
      const planes = [
        { name: 'XY', to3D: (u, v) => ({ x: u, y: v, z: 0 }), alpha: 0.9 },
        { name: 'XZ', to3D: (u, v) => ({ x: u, y: 0, z: v }), alpha: 0.7 },
        { name: 'YZ', to3D: (u, v) => ({ x: 0, y: v, z: u }), alpha: 0.7 }
      ];
      
      planes.forEach((plane) => {
        const wedgeAngle = (Math.PI * 2) / symmetry;
        
        for (let wedge = 0; wedge < symmetry; wedge++) {
          const wedgeRotation = wedge * wedgeAngle + baseRotation;
          const flip = wedge % 2 === 1;
          
          // Apply symmetry mode transformations (like in 2D mode)
          let symmetryFlipY = flip;
          let symmetryFlipX = false;
          let symmetryRotOffset = 0;
          
          if (symmetryMode === 'snowflake' && symmetryIntensity > 0) {
            // Snowflake: mirror every other wedge
            symmetryFlipY = wedge % 2 === 1;
          } else if (symmetryMode === 'kaleidoscope' && symmetryIntensity > 0) {
            // Kaleidoscope: cross-mirroring
            symmetryFlipY = wedge % 2 === 1;
            const quadrant = Math.floor(wedge / (symmetry / 4));
            symmetryFlipX = quadrant % 2 === 1;
          } else if (symmetryMode === 'mandala' && symmetryIntensity > 0) {
            // Mandala: concentric variations
            const ring = wedge % 5;
            symmetryFlipY = wedge % 2 === 1;
            symmetryRotOffset = ring * 0.3 * symmetryIntensity;
          } else if (symmetryMode === 'crystalline' && symmetryIntensity > 0) {
            // Crystalline: grid-based mirroring
            const gridX = wedge % 4;
            const gridY = Math.floor(wedge / 4) % 4;
            symmetryFlipX = gridX % 2 === 1;
            symmetryFlipY = gridY % 2 === 1;
          }
          
          notes.forEach((note) => {
            const saturation = 70 + (note.velocity / 127) * 30;
            const lightness = 45 + (note.velocity / 127) * 25;
            
            // Get position based on arrangement mode
            const pos = getNotePosition(note, wedgeAngle, discRadius);
            let localX = pos.x;
            let localY = pos.y;
            
            // Apply symmetry mode flips
            if (symmetryFlipY) localY = -localY;
            if (symmetryFlipX) localX = -localX;
            
            const cosW = Math.cos(wedgeRotation + symmetryRotOffset);
            const sinW = Math.sin(wedgeRotation + symmetryRotOffset);
            const u = localX * cosW - localY * sinW;
            const v = localX * sinW + localY * cosW;
            
            // Apply tiling/tessellation offset in 3D
            let tileOffsetX = 0;
            let tileOffsetY = 0;
            let tileOffsetZ = 0;
            
            if (symmetryIntensity > 0.3 && tilingDensity > 0.5) {
              const tilePattern = tessellationPattern === 'auto' ? 
                (symmetryMode === 'kaleidoscope' ? 'triangular' :
                 symmetryMode === 'crystalline' ? 'hexagonal' : 'radial') :
                tessellationPattern;
              
              if (tilePattern === 'hexagonal') {
                // Hexagonal offset pattern
                const hexRow = Math.floor(wedge / 3) % 3;
                const hexCol = wedge % 3;
                tileOffsetX = (hexCol - 1) * discRadius * 0.3 * tilingDensity * symmetryIntensity;
                tileOffsetY = (hexRow - 1) * discRadius * 0.3 * tilingDensity * symmetryIntensity;
              } else if (tilePattern === 'square') {
                // Square grid offset
                const gridRow = Math.floor(wedge / 4) % 2;
                const gridCol = wedge % 4;
                tileOffsetX = (gridCol - 2) * discRadius * 0.25 * tilingDensity * symmetryIntensity;
                tileOffsetY = (gridRow - 1) * discRadius * 0.25 * tilingDensity * symmetryIntensity;
              } else if (tilePattern === 'radial') {
                // Radial depth layers
                const layer = wedge % 3;
                tileOffsetZ = (layer - 1) * discRadius * 0.4 * tilingDensity * symmetryIntensity;
              }
            }
            
            const pos3D = plane.to3D(u + tileOffsetX, v + tileOffsetY);
            const projected = project3D(pos3D.x, pos3D.y, pos3D.z + tileOffsetZ);
            
            const baseSize = 5 + (note.velocity / 127) * 15;
            const pulseAmount = shapePulse > 0 ? Math.sin(time * 0.003 * (1 + shapePulse) + note.pitchClass) * shapePulse * 0.3 : 0;
            const size = baseSize * (shapeSize || 1) * (1 + pulseAmount) * projected.scale;
            
            elementsToDraw.push({
              x: projected.x,
              y: projected.y,
              z: projected.z,
              size,
              pitchClass: note.pitchClass,
              saturation,
              lightness,
              alpha: plane.alpha * Math.max(0.3, Math.min(1, (projected.z + discRadius) / (discRadius * 1.5))),
              velocity: note.velocity
            });
          });
        }
      });
    }
    
    // Sort by z (back to front)
    elementsToDraw.sort((a, b) => a.z - b.z);
    
    // Draw all elements
    elementsToDraw.forEach((el) => {
      // Handle streak type (motion blur lines)
      if (el.type === 'streak') {
        const hue = PITCH_CLASS_HUES[el.pitchClass] || 0;
        const gradient = ctx.createLinearGradient(el.x1, el.y1, el.x2, el.y2);
        gradient.addColorStop(0, `hsla(${hue}, 70%, 50%, 0)`);
        gradient.addColorStop(0.5, `hsla(${hue}, 70%, 60%, ${el.alpha})`);
        gradient.addColorStop(1, `hsla(${hue}, 70%, 70%, ${el.alpha * 0.5})`);
        ctx.strokeStyle = gradient;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(el.x1, el.y1);
        ctx.lineTo(el.x2, el.y2);
        ctx.stroke();
        return;
      }
      
      // Glow
      if (glowIntensity > 0 && el.size) {
        const glowSize = el.size * (2 + glowIntensity * 2);
        const gradient = ctx.createRadialGradient(el.x, el.y, 0, el.x, el.y, glowSize);
        gradient.addColorStop(0, getColor(el.pitchClass, el.saturation || 70, el.lightness || 50, 0.4 * glowIntensity * el.alpha));
        gradient.addColorStop(1, getColor(el.pitchClass, el.saturation || 70, el.lightness || 50, 0));
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(el.x, el.y, glowSize, 0, Math.PI * 2);
        ctx.fill();
      }
      
      // Main shape - support different geometry modes and effects
      if (el.size) {
        const hue = pitchClassToHue(el.pitchClass);
        const saturation = el.saturation || 70;
        const lightness = el.lightness || 50;
        
        // Use gradient colors if enabled
        let fillColor;
        if (gradientMode) {
          const gradient = ctx.createRadialGradient(el.x, el.y, 0, el.x, el.y, el.size);
          gradient.addColorStop(0, `hsla(${hue}, ${saturation + 20}%, ${lightness + 20}%, ${el.alpha})`);
          gradient.addColorStop(1, `hsla(${(hue + 60) % 360}, ${saturation}%, ${lightness - 10}%, ${el.alpha * 0.7})`);
          fillColor = gradient;
        } else {
          fillColor = getColor(el.pitchClass, saturation, lightness, el.alpha);
        }
        
        ctx.fillStyle = fillColor;
        ctx.strokeStyle = fillColor;
        ctx.lineWidth = Math.max(1, el.size * 0.15);
